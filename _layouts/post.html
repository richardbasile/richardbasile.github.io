---
layout: default
---

<article>
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
    {{ content }}
</article>

<nav class="post-nav">
    {% if page.next %}
    <a href="{{ page.next.url }}" class="post-nav-newer">← {{ page.next.title }}</a>
    {% endif %}
    {% if page.previous %}
    <a href="{{ page.previous.url }}" class="post-nav-older">{{ page.previous.title }} →</a>
    {% endif %}
</nav>
