title: Richard Basile
description: Fueled by faith, family, and the long run.
url: "https://richardbasile.github.io"
baseurl: ""
repository: richardbasile/richardbasile.github.io

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-paginate

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

paginate: 1
paginate_path: "/page:num/"

markdown: kramdown
permalink: /:title/
header_pages:
  - index.html
  - archive.md
  - connect.md